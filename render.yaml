services:
  - type: web
    name: ncemds-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        value: supersecret_change_me_!a1B2c3D4e5F6g7H8
      - key: JWT_EXPIRES_IN
        value: 7d
